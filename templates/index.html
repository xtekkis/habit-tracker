<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Habit Tracker</title>
</head>
<body>
    <h1>Habit Tracker</h1>

    <form action="/add" method="POST">
        <input type="text" name="name" placeholder="New habit..." required>
        <button type="submit">Add</button>
    </form>

    <ul>
        {% for habit in habits %}
        <li>
            {{ habit["name"] }}
            <a href="/delete/{{ habit['id'] }}">Delete</a>
        </li>
        {% endfor %}
    </ul>
</body>
</html>
