{% extends "base.html" %}
{% block title %}Habits — Habit Tracker{% endblock %}

{% block content %}
<section class="add-form">
    <form action="/add" method="POST">
        <input type="text" name="name" placeholder="New habit..." required>
        <button type="submit">Add</button>
    </form>
</section>

<section class="habit-list">
    {% for habit in habits %}
    <div class="habit-card">
        <div class="habit-info">
            <span class="habit-name">{{ habit["name"] }}</span>
            <span class="habit-streak">{{ streaks[habit["id"]] }} day streak</span>
        </div>
        <div class="habit-actions">
            <form action="/log/{{ habit['id'] }}" method="POST">
                <button type="submit">Log today</button>
            </form>
            <a class="delete" href="/delete/{{ habit['id'] }}">Delete</a>
        </div>
    </div>
    {% else %}
    <p class="empty">No habits yet. Add one above.</p>
    {% endfor %}
</section>
{% endblock %}
