<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Habit Tracker</title>
</head>
<body>
    <h1>Habit Tracker</h1>
    <nav>
        <a href="/weekly">Weekly Summary</a>
    </nav>

    <form action="/add" method="POST">
        <input type="text" name="name" placeholder="New habit..." required>
        <button type="submit">Add</button>
    </form>

    <ul>
        {% for habit in habits %}
        <li>
            {{ habit["name"] }} — Streak: {{ streaks[habit["id"]] }} day(s)
            <form action="/log/{{ habit['id'] }}" method="POST" style="display:inline">
                <button type="submit">Log today</button>
            </form>
            <a href="/delete/{{ habit['id'] }}">Delete</a>
        </li>
        {% endfor %}
    </ul>
</body>
</html>
