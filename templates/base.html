<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Habit Tracker{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-shell">
        <header class="top-bar">
            {% block top_bar_content %}
            <h1 class="app-title">{% block page_title %}Today{% endblock %}</h1>
            {% endblock %}
        </header>
        <main class="page-content">
            {% block content %}{% endblock %}
        </main>
        <nav class="tab-bar">
            <a href="/" class="tab-btn" id="tab-today">
                <i data-lucide="home"></i>
                <span>Today</span>
            </a>
            <a href="/weekly" class="tab-btn" id="tab-insights">
                <i data-lucide="bar-chart-2"></i>
                <span>Insights</span>
            </a>
            <button class="tab-fab" id="tab-fab" aria-label="Add habit">
                <i data-lucide="plus"></i>
            </button>
            <a href="/calendar" class="tab-btn" id="tab-calendar">
                <i data-lucide="calendar"></i>
                <span>Calendar</span>
            </a>
            <a href="/settings" class="tab-btn" id="tab-settings">
                <i data-lucide="settings"></i>
                <span>Settings</span>
            </a>
        </nav>
    </div>
    <script>
        lucide.createIcons();

        // Global sheet helpers (used by index, settings, and any page with sheets)
        function openSheet(id) {
            var el = document.getElementById(id);
            if (!el) return;
            el.classList.add('active');
            document.documentElement.classList.add('no-scroll');
        }
        function closeSheet(id) {
            var el = document.getElementById(id);
            if (el) el.classList.remove('active');
            if (!document.querySelector('.sheet-overlay.active')) {
                document.documentElement.classList.remove('no-scroll');
            }
        }

        // Active tab
        (function() {
            var path = window.location.pathname;
            if (path === '/') {
                document.getElementById('tab-today').classList.add('active');
            } else if (path.startsWith('/weekly') || path.startsWith('/monthly')) {
                document.getElementById('tab-insights').classList.add('active');
            } else if (path === '/calendar' || (path.startsWith('/habit/') && path.endsWith('/calendar'))) {
                document.getElementById('tab-calendar').classList.add('active');
            } else if (path === '/settings') {
                document.getElementById('tab-settings').classList.add('active');
            }
        })();

        // FAB wired here so tab-bar is already in DOM
        (function() {
            var fab = document.getElementById('tab-fab');
            if (!fab) return;
            fab.addEventListener('click', function() {
                var addSheet = document.getElementById('addSheet');
                if (addSheet) {
                    openSheet('addSheet');
                    setTimeout(function() {
                        var input = addSheet.querySelector('input[name="name"]');
                        if (input) input.focus();
                    }, 350);
                } else {
                    window.location.href = '/?add=1';
                }
            });
        })();
    </script>
</body>
</html>
